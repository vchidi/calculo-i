<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Menú</title>
<style>
  body{
    font-family:-apple-system,system-ui,Segoe UI,Arial;
    margin:8px;
    background:#f6f6f6;
    font-size:15px;
  }
  .box{
    background:#fff;
    border-radius:12px;
    padding:10px;
    margin-bottom:10px;
    box-shadow:0 1px 3px rgba(0,0,0,.12);
  }
  h2{
    margin:0 0 8px;
    font-size:18px;
  }
  button{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
    font-size:16px;
    margin-top:8px;
    font-weight:700;
    color:#fff;
  }
  .green{ background:#34c759; }
  .blue{ background:#007aff; }
  .orange{ background:#f59e0b; }
  .violet{ background:#7c3aed; }
  .muted{
    color:#666;
    font-size:13px;
    margin-top:6px;
  }
</style>
</head>
<body>

<div class="box">
  <h2>Elegir pantalla</h2>

  <button class="green" onclick="location.href='index3.html'">
    App Yago
  </button>

  <button class="blue" onclick="location.href='index1.html'">
    Método Val
  </button>

  <button class="orange" onclick="location.href='index3_review.html'">
    Revisión
  </button>

  <button class="violet" onclick="location.href='index4.html'">
    Histórico
  </button>

  <div class="muted">
    Menú principal de la app.
  </div>
</div>

</body>
</html>
