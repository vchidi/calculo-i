<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>App Yago</title>
<style>
:root{
  --bg:#f4f7ff;
  --card:#fff;
  --txt:#0f172a;
  --muted:#64748b;
  --border:#dbe3ff;
  --shadow:0 10px 26px rgba(15,23,42,.10);
  --blue:#2563eb;
  --green:#16a34a;
  --orange:#f59e0b;
  --violet:#7c3aed;
  --soft:#eef4ff;
  --softBorder:#c7d6ff;
  --radius:16px;
}
*{box-sizing:border-box}
body{
  font-family:-apple-system,system-ui,Segoe UI,Arial;
  margin:8px;
  background:linear-gradient(180deg,#eef2ff 0%,#f8fafc 70%);
  color:var(--txt);
  font-size:15px;
}
.topNav{display:flex;gap:6px;margin-bottom:8px}
.topNav a{flex:1;text-decoration:none}
.navBtn{
  width:100%;
  border-radius:14px;
  border:1px solid var(--border);
  background:#fff;
  padding:8px;
  font-weight:950;
  font-size:14px;
}
.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:10px;
  margin-bottom:8px;
  box-shadow:var(--shadow);
  border:1px solid rgba(219,227,255,.9);
}
.title{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:4px;
}
.title h1{
  font-size:16px;
  margin:0;
  font-weight:1100;
}
.badge{
  display:inline-flex;
  align-items:center;
  background:#eef2ff;
  border:1px solid var(--border);
  padding:4px 8px;
  border-radius:999px;
  font-size:12px;
  font-weight:950;
  color:#1e293b;
}
.muted{
  color:var(--muted);
  font-size:12px;
  line-height:1.2;
}
label{
  font-weight:950;
  font-size:12px;
}
input,select,button,textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:14px;
  border:1px solid var(--border);
  font-size:15px;
  background:#fff;
}
textarea{
  resize:vertical;
  min-height:92px;
}
button{
  border:none;
  font-weight:1100;
}
.userField{
  background:var(--soft);
  border:1px solid var(--softBorder);
}
.pickerField{
  background:var(--soft);
  border:1px solid var(--softBorder);
  padding:10px;
  margin-top:5px;
  border-radius:14px;
  min-height:44px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  cursor:pointer;
  font-size:15px;
  font-weight:700;
}
.pickerField .hint{
  color:var(--muted);
  font-weight:600;
}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btnBlue{background:var(--blue);color:#fff}
.btnGreen{background:var(--green);color:#fff}
.btnGhost{background:#eef2ff;color:#0f172a;border:1px solid var(--border)}
.btnOrange{background:var(--orange);color:#0f172a}
.btnViolet{background:var(--violet);color:#fff}
.pill{
  border-radius:16px;
  padding:8px;
  border:1px solid var(--border);
  background:linear-gradient(180deg,#fff 0%,#f7faff 100%);
}
.pill .k{font-size:11px;color:var(--muted);font-weight:950}
.pill .v{font-size:18px;font-weight:1200}
.err{color:#b00020;font-weight:1100;margin-top:6px}
.ok{color:#166534;font-weight:1100;margin-top:6px}

.catGrid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  margin-top:8px;
}
.catBtn{
  border-radius:14px;
  border:1px solid var(--border);
  background:#fff;
  padding:10px 8px;
  font-weight:1100;
  text-align:center;
  line-height:1.1;
  user-select:none;
  cursor:pointer;
}
.catBtn.active{
  background:#eaf0ff;
  border:1px solid #9bb7ff;
}
.catBtn .e{
  font-size:20px;
  display:block;
  margin-bottom:4px;
}
.catBtn .t{
  font-size:12px;
  color:#0f172a;
}

.acWrap{position:relative}
.acList{
  position:absolute;
  left:0;
  right:0;
  top:100%;
  background:#fff;
  border:1px solid var(--border);
  border-radius:14px;
  box-shadow:0 16px 30px rgba(0,0,0,.12);
  overflow:hidden;
  z-index:50;
  margin-top:6px;
  max-height:260px;
  overflow-y:auto;
}
.acItem{
  padding:10px;
  border-bottom:1px solid #f0f3ff;
  display:flex;
  justify-content:space-between;
  gap:10px;
  font-size:14px;
  cursor:pointer;
}
.acItem:last-child{border-bottom:none}
.acItem:hover,.acItem.active{background:#eaf0ff}
.emoji{
  font-size:18px;
  width:22px;
  text-align:center;
  flex:0 0 auto;
}

.sel{
  margin-top:8px;
  border:1px dashed #e5e7ff;
  border-radius:14px;
  padding:8px;
  background:#fff;
}
.foodTable,.miniTable{
  width:100%;
  border-collapse:collapse;
  margin-top:2px;
}
.foodTable td,.miniTable td{
  padding:6px 4px;
  border-bottom:1px dashed #eef2ff;
  vertical-align:middle;
  font-size:14px;
}
.foodTable tr:last-child td,.miniTable tr:last-child td{border-bottom:none}
.foodName{font-weight:1000}
.rInline{
  width:72px;
  margin:0;
  padding:6px 8px;
  border-radius:10px;
  font-size:13px;
  text-align:center;
}
.gInline{
  font-size:13px;
  font-weight:900;
  white-space:nowrap;
  text-align:right;
}
.xBtn{
  width:auto;
  margin:0;
  padding:6px 10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#fff;
  font-weight:1100;
  font-size:13px;
}
.miniBtn{
  width:auto;
  padding:6px 10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#fff;
  font-size:12px;
  font-weight:1000;
  margin:0;
}
details{
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  background:#fff;
}
summary{
  list-style:none;
  cursor:pointer;
  padding:10px;
  font-weight:1200;
  background:linear-gradient(180deg,#fff 0%,#f4f7ff 100%);
}
summary::-webkit-details-marker{display:none}
.detailsBody{padding:10px}
pre{
  background:#f3f6ff;
  border:1px solid var(--border);
  padding:10px;
  border-radius:14px;
  font-size:12px;
  white-space:pre-wrap;
  word-break:break-word;
  margin:8px 0 0;
}

.pickerOverlay{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.32);
  display:none;
  align-items:flex-end;
  justify-content:center;
  z-index:9999;
}
.pickerSheet{
  width:100%;
  max-width:520px;
  background:#fff;
  border-radius:22px 22px 0 0;
  padding:10px 10px 18px;
  box-shadow:0 -10px 30px rgba(0,0,0,.18);
}
.pickerTop{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  margin-bottom:8px;
}
.pickerTitle{
  font-weight:1100;
  font-size:16px;
}
.pickerTopBtn{
  width:auto;
  padding:8px 12px;
  margin:0;
  border-radius:12px;
  font-size:14px;
}
.wheelWrap{
  position:relative;
  height:240px;
  overflow:hidden;
  border-radius:18px;
  background:linear-gradient(180deg,#f8fbff 0%,#fff 18%,#fff 82%,#f8fbff 100%);
  border:1px solid var(--border);
}
.wheelHighlight{
  position:absolute;
  left:0;
  right:0;
  top:98px;
  height:44px;
  border-top:1px solid #cfe0ff;
  border-bottom:1px solid #cfe0ff;
  background:rgba(37,99,235,.05);
  pointer-events:none;
}
.wheel{
  height:240px;
  overflow-y:auto;
  overflow-x:hidden;
  scroll-snap-type:y mandatory;
  -webkit-overflow-scrolling:touch;
  padding:98px 0;
  touch-action:pan-y;
  overscroll-behavior-x:none;
}
.wheelItem{
  height:44px;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  scroll-snap-align:center;
  font-size:24px;
  font-weight:800;
  color:#334155;
}
.wheelSub{
  font-size:12px;
  color:var(--muted);
  text-align:center;
  margin-top:8px;
}
.row > div {
  flex: 1;
  min-width: 120px;
}
</style>
</head>

  };
}

  localStorage.setItem("isf_" + meal, String(isf));
}

function loadEntries(){

    const arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  }catch{return []}
}
function saveEntries(arr){
  localStorage.setItem(ENTRIES_KEY, JSON.stringify(arr));
}
function saveEntry(entry){
  const arr = loadEntries();
  arr.push(entry);
  saveEntries(arr);
}

function loadCategories(){
  try{
    const raw = localStorage.getItem(CATS_KEY);
    const custom = raw ? JSON.parse(raw) : [];
    if(!Array.isArray(custom) || !custom.length) return DEFAULT_CATEGORIES.slice();
    const merged = [...DEFAULT_CATEGORIES.filter(c=>c.id==="all")];
    const seen = new Set(["all"]);
    for(const c of [...DEFAULT_CATEGORIES.filter(c=>c.id!=="all"), ...custom]){
      if(c && c.id && !seen.has(c.id)){
        merged.push(c);
        seen.add(c.id);
      }
    }
    return merged;
  }catch{
    return DEFAULT_CATEGORIES.slice();
  }
}
function saveCategories(arr){
  localStorage.setItem(CATS_KEY, JSON.stringify(arr.filter(c=>c.id!=="all")));
}

function loadFoods(){
  try{
    const raw = localStorage.getItem(FOODS_KEY);
    const custom = raw ? JSON.parse(raw) : [];
    const map = new Map();
    for(const f of DEFAULT_FOODS){
      map.set(norm(f.name), {name:f.name, r:Number(f.r), cat:f.cat});
    }
    for(const f of custom){
      if(f?.name){
        map.set(norm(f.name), {name:String(f.name), r:Number(f.r), cat:f.cat || "otros"});
      }
    }
    return Array.from(map.values()).sort((a,b)=>norm(a.name).localeCompare(norm(b.name)));
  }catch{
    return DEFAULT_FOODS.slice();
  }
}
function saveCustomFood(food){
  const raw = localStorage.getItem(FOODS_KEY);
  const arr = raw ? JSON.parse(raw) : [];
  arr.push(food);
  localStorage.setItem(FOODS_KEY, JSON.stringify(arr));
}

function foodEmoji(food){

}

function calcInpen({bg, goal, hc, ratio, isf, iob}){
  const bolusHC = hc / ratio;
  const corr = (bg - goal) / isf;
  const corrEff = Math.max(0, corr - iob);
  const bolusVal = bolusHC + corr;
  return { bolusHC, corr, corrEff, bolus: bolusHC + corrEff, bolusVal };
}

function roundHalf(x){
  return Math.round(x * 2) / 2;
}

function buildRange(start, end, step){
  const out = [];
  const decimals = (String(step).split(".")[1] || "").length;
  for(let v = start; v <= end + step/2; v += step){
    out.push(Number(v.toFixed(decimals)));
  }
  return out;
}

function openPicker({title, values, current, formatter, target, sub=""}){
  pickerState.target = target;
  pickerState.values = values;
  pickerState.formatter = formatter;
  pickerState.selected = current;

  $("pickerTitle").textContent = title;
  $("pickerSub").textContent = sub || "";

  const wheel = $("pickerWheel");
  wheel.innerHTML = values.map(v => `<div class="wheelItem">${formatter(v)}</div>`).join("");

  $("pickerOverlay").style.display = "flex";

  requestAnimationFrame(()=>{
    const index = Math.max(0, values.findIndex(v => Number(v) === Number(current)));
    wheel.scrollTop = index * 44;
    syncPickerSelection(true);
  });
}

function closePicker(){
  $("pickerOverlay").style.display = "none";
}

function syncPickerSelection(forceSnap=false){
  const wheel = $("pickerWheel");
  const index = Math.round(wheel.scrollTop / 44);
  const safeIndex = Math.max(0, Math.min(index, pickerState.values.length - 1));
  pickerState.selected = pickerState.values[safeIndex];

  wheel.querySelectorAll(".wheelItem").forEach((el, i)=>{
    el.style.opacity = (i === safeIndex) ? "1" : "0.45";
    el.style.transform = (i === safeIndex) ? "scale(1.05)" : "scale(0.96)";
  });

  clearTimeout(pickerState.timer);
  pickerState.timer = setTimeout(()=>{
    wheel.scrollTo({ top: safeIndex * 44, behavior: forceSnap ? "auto" : "smooth" });
  }, 80);
}

function hideSuggestions(){

function renderSuggestions(){
  const list = $("acList");

  if(suggestions.length === 0){
    list.innerHTML = `<div class="acItem"><div><b>Sin resultados</b></div><small></small></div>`;
    list.style.display = "block";
    updateCloseFoodBtn();
    return;
  }

  list.innerHTML = suggestions.map((f, idx)=>{
    const g = (Number(f.r)||0) * GRAMS_PER_R;
    return `
      <div class="acItem ${idx===activeIndex ? "active" : ""}" data-idx="${idx}">
        <div style="display:flex;gap:8px;">
          <div class="emoji">${foodEmoji(f)}</div>
          <div>
            <b>${f.name}</b>
            <div class="muted">${Number(f.r).toFixed(2)} R · ${g.toFixed(0)} g</div>
          </div>
        </div>
        <small>➕</small>
      </div>
    `;
  }).join("");

  list.querySelectorAll(".acItem").forEach(item=>{
    item.addEventListener("click", ()=>selectSuggestion(Number(item.dataset.idx)));
  });

  list.style.display = "block";
  updateCloseFoodBtn();
}

function selectSuggestion(idx){
  const f = suggestions[idx];
  if(!f) return;
  selected.push({name:f.name, r:Number(f.r), cat:f.cat});
  activeIndex = -1;
  syncMenuTotalsToUI();

  if(menuMode === "category"){
    $("foodSearch").value = "";
    showSuggestions("");
    keepSuggestionsOpen();
  }else{
    const q = $("foodSearch").value;
    showSuggestions(q);
    keepSuggestionsOpen();
  }

  $("foodSearch").focus();
}

function showSuggestions(q){
  const query = norm(q);
  let pool = FOODS;

  if(query){
    menuMode = "search";
    categoryDropdownPinned = false;
    pool = FOODS;
  }else if(menuMode === "category" && activeCategory !== "all"){
    pool = FOODS.filter(f=>f.cat===activeCategory);
  }else{
    pool = FOODS;
  }

  suggestions = (!query
    ? pool
    : pool.filter(f=>norm(f.name).startsWith(query) || norm(f.name).includes(query))
  ).slice(0,12);

  activeIndex = suggestions.length ? 0 : -1;

  if(query || categoryDropdownPinned || suggestions.length){
    renderSuggestions();
    keepSuggestionsOpen();
  }else{
    hideSuggestions();
  }
}

function updateOp(){
  $("err").textContent = "";
  $("ok").textContent = "";

  const goal = Number(formState.goal);
  const bg = Number(formState.bg);
  const hc = num($("hc").value);
  const iob = Number(formState.iob);
  const p = loadParams(currentMeal());

  if(!isFinite(goal) || !isFinite(bg) || !isFinite(hc) || !isFinite(iob) || !isFinite(p.ratio) || !isFinite(p.isf) || p.ratio===0 || p.isf===0){
    $("op").textContent = "Introduce glucosa, objetivo, HC, IOB y que HC/i e ISF no sean 0.";
    return;
  }

const res = calcInpen({bg, goal, hc, ratio:p.ratio, isf:p.isf, iob});

$("op").textContent =
`BolusHC = ${hc} / ${p.ratio.toFixed(2)} = ${res.bolusHC.toFixed(2)} U
Corrección = (${bg}-${goal})/${p.isf} = ${res.corr.toFixed(2)} U
BolusVal = ${res.bolusHC.toFixed(2)} + (${res.corr.toFixed(2)}) = ${res.bolusVal.toFixed(2)} U
Corr. efectiva = max(0, ${res.corr.toFixed(2)} - ${iob.toFixed(1)}) = ${res.corrEff.toFixed(2)} U
BolusInPen = ${res.bolus.toFixed(2)} U`;
}

function calculateOnly(){
  const goal = Number(formState.goal);
  const bg = Number(formState.bg);
  const hc = num($("hc").value);
  const iob = Number(formState.iob);
  const p = loadParams(currentMeal());

  if(!isFinite(goal) || !isFinite(bg) || !isFinite(hc) || !isFinite(iob)){
    $("err").textContent = "Datos inválidos";
    return null;
  }

  const res = calcInpen({bg, goal, hc, ratio:p.ratio, isf:p.isf, iob});
  lastBolus = res.bolus;

  $("bolusRaw").textContent = lastBolus.toFixed(2);
  $("bolusRounded").textContent = roundHalf(lastBolus).toFixed(1);

  updateOp();
  lastCalcSnapshot = snapshotState();
  return res;
}

        $("err").textContent = "Primero calcula.";
        return;
      }
    }

    const menuText = selected.map(s => `${s.name} ${Number(s.r).toFixed(2)}R`).join(" + ");

    saveEntry({
      id: "e_" + Date.now() + "_" + Math.random().toString(36).slice(2,7),
      ts: Date.now(),
      meal: currentMeal(),
      menu_text: menuText,
      selected_foods: selected,
      ratio_target: loadParams(currentMeal()).ratio,
      bg: Number(formState.bg),
      goal: Number(formState.goal),
      hc_g: num($("hc").value),
      iob: Number(formState.iob),
      bolus_suggested: Number(lastBolus),
      insulin_put: Number(formState.insulinPut),
      notes: "",
      i_good: null,
      ratio_good: null,
      applied_good_ratio: false
    });

    $("ok").textContent = "Entrada guardada en histórico ✅";
  });

  $("addFood").addEventListener("click", ()=>{
    const name = String($("newFoodName").value || "").trim();
    const r = num($("newFoodR").value);
    const cat = $("newFoodCat").value;

    if(!name) return alert("Escribe un nombre");
    if(!isFinite(r)) return alert("Raciones inválidas");
    if(!cat) return alert("Elige una categoría");

    saveCustomFood({name,r,cat});
    FOODS = loadFoods();

    $("newFoodName").value = "";
    $("newFoodR").value = "";
    showSuggestions($("foodSearch").value);
    alert("Añadido ✅");
  });

  $("addCat").addEventListener("click", ()=>{
    const name = String($("newCatName").value || "").trim();
    const emoji = String($("newCatEmoji").value || "").trim() || "📁";
    if(!name) return alert("Escribe un nombre");

    const id = slug(name);
    if(CATEGORIES.some(c=>c.id===id)) return alert("Ya existe una categoría parecida");

    CATEGORIES.push({id,name,emoji});
    saveCategories(CATEGORIES);
    renderCategories();
    renderCategoryTable();

    $("newCatName").value = "";
    $("newCatEmoji").value = "";
  });
})();
</script>
</body>
</html>
