<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>InPen básico</title>

<style>
body{
font-family:-apple-system,system-ui;
margin:8px;
background:#f4f7ff;
}

.card{
background:#fff;
border-radius:14px;
padding:10px;
margin-bottom:10px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
}

input,select,button{
width:100%;
padding:10px;
margin-top:6px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
border:none;
background:#2563eb;
color:white;
font-weight:700;
}

.nav{
display:grid;
grid-template-columns:1fr 1fr 1fr 1fr 1fr;
gap:6px;
margin-bottom:10px;
}

.nav button{
background:#fff;
color:black;
border:1px solid #ccc;
}

.result{
font-size:20px;
font-weight:800;
text-align:center;
}
</style>
</head>

<body>

<div class="nav">
<button onclick="location.href='index0.html'">Menú</button>
<button onclick="location.href='index2.html'">InPen</button>
<button onclick="location.href='index3.html'">App</button>
<button onclick="location.href='index3_review.html'">Revisión</button>
<button onclick="location.href='index4.html'">Histórico</button>
</div>

<div class="card">

<label>Franja</label>
<select id="meal">
<option>Desayuno</option>
<option>Snack</option>
<option>Comida</option>
<option>Merienda cole</option>
<option>Cena</option>
</select>

<label>Glucosa</label>
<input id="bg">

<label>HC (g)</label>
<input id="hc">

<label>IOB</label>
<input id="iob">

<button onclick="calc()">Calcular</button>

</div>

<div class="card result" id="result">
—
</div>

<script>

const PARAMS = {
"Desayuno":{ratio:3.75,isf:25},
"Snack":{ratio:5.36,isf:25},
"Comida":{ratio:7.14,isf:30},
"Merienda cole":{ratio:8.06,isf:30},
"Cena":{ratio:8.65,isf:30}
}

function calc(){

const meal=document.getElementById("meal").value
const bg=Number(bgInput.value)
const hc=Number(hcInput.value)
const iob=Number(iobInput.value)||0

const goal=Number(localStorage.getItem("goal_glucose"))||100

const ratio=PARAMS[meal].ratio
const isf=PARAMS[meal].isf

const bolusHC=hc/ratio
const corr=(bg-goal)/isf
const corrEff=Math.max(0,corr-iob)

const bolus=bolusHC+corrEff

result.innerText=bolus.toFixed(2)+" U"

}

const bgInput=document.getElementById("bg")
const hcInput=document.getElementById("hc")
const iobInput=document.getElementById("iob")

</script>

</body>
</html>
